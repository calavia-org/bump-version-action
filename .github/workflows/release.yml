name: Release Collection

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.1.0)'
        required: true
        type: string
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  sanity:
    name: Sanity Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install tox-ansible
        run: python3 -m pip install tox-ansible

      - name: Run sanity test
        run: >-
          python3 -m tox
          --ansible
          -e sanity-py3.12-2.19
          --conf tox-ansible.ini
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  unit_test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install tox-ansible
        run: python3 -m pip install tox-ansible

      - name: Run unit test
        run: >-
          python3 -m tox
          --ansible
          -e unit-py3.12-2.19
          --conf tox-ansible.ini
          --
          --show-capture=all
          --cov=unit
          --cov-report=xml
          --junit-xml=tests/reports/unit.xml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v6.0.1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  integration_test:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install tox-ansible
        run: python3 -m pip install tox-ansible

      - name: Run integration test
        run: >-
          python3 -m tox
          --ansible
          -e integration-py3.12-2.19
          --conf tox-ansible.ini
          --
          --show-capture=all
          --junit-xml=tests/reports/integration.xml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    name: Build and Release
    needs: [sanity, unit_test, integration_test]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing version: $VERSION"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python3 -m pip install ansible tox-ansible

      - name: Update galaxy.yml version
        run: |
          sed -i "s/^version: .*/version: ${{ steps.version.outputs.version }}/" collections/ansible_collections/calaviaorg/setup/galaxy.yml
          grep "^version:" collections/ansible_collections/calaviaorg/setup/galaxy.yml

      - name: Generate release notes
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          {
            echo "# Changelog"
            echo ""
            echo "## [$VERSION] - $(date +%Y-%m-%d)"
            echo ""

            if [ -n "$PREVIOUS_TAG" ]; then
              git log "$PREVIOUS_TAG..HEAD" --pretty=format:"- %s (%h)" --no-merges
            else
              git log --pretty=format:"- %s (%h)" --no-merges
            fi

            echo ""
          } > RELEASE_NOTES.md

          cat RELEASE_NOTES.md | head -30

      - name: Build collection
        run: |
          cd collections/ansible_collections/calaviaorg/setup
          ansible-galaxy collection build --force
          ls -la *.tar.gz

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Release v${{ steps.version.outputs.version }}
          body_path: RELEASE_NOTES.md
          files: |
            collections/ansible_collections/calaviaorg/setup/calaviaorg-setup-*.tar.gz
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to Ansible Galaxy
        run: |
          cd collections/ansible_collections/calaviaorg/setup
          ansible-galaxy collection publish calaviaorg-setup-*.tar.gz --api-key="${{ secrets.ANSIBLE_GALAXY_API_KEY }}"
        env:
          ANSIBLE_GALAXY_API_KEY: ${{ secrets.ANSIBLE_GALAXY_API_KEY }}
