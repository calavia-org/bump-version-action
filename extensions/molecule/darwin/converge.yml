---
- name: Converge
  hosts: all
  collections:
    - jcalavia_org.setup
  tasks:
    - name: 'Include git'
      ansible.builtin.include_role:
        name: git

    - name: 'Include gpg'
      ansible.builtin.include_role:
        name: gpg

    - name: 'Include nvim'
      ansible.builtin.include_role:
        name: nvim

    - name: 'Include tmux'
      ansible.builtin.include_role:
        name: tmux

    - name: 'Include opencode'
      ansible.builtin.include_role:
        name: opencode

    - name: 'Include mise'
      ansible.builtin.include_role:
        name: mise
