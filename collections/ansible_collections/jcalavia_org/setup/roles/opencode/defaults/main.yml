---
opencode_installer: binary
opencode_version: ''
opencode_privilege_escalation: true
opencode_os_pkgs:
  - opencode

# Plugin toggles — explicit enable/disable per plugin
opencode_engram_enable: true
opencode_opentmux_enable: false

# Engram configuration
opencode_engram_mcp_command: ["engram", "mcp", "--tools=agent"]
opencode_engram_mcp_enabled: true
opencode_engram_mcp_type: local

# OpenTmux configuration
opencode_opentmux_package: opentmux
opencode_opentmux_tmux_tpm_enable: false

opencode_config_dir: '{{ ansible_env.HOME }}/.config/opencode'
opencode_skip_configure: false
