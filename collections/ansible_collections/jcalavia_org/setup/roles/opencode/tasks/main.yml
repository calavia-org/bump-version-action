---
- name: 'Resolve platform specific vars'
  ansible.builtin.include_vars: '{{ item }}'
  with_first_found:
    - files:
        - '{{ ansible_distribution }}-{{ ansible_distribution_release }}.yml'
        - '{{ ansible_distribution }}.yml'
        - '{{ ansible_os_family }}.yml'
      skip: true
      paths:
        - '{{ role_path }}/vars'

- name: 'Install OpenCode'
  ansible.builtin.include_tasks: '{{ opencode_installer }}.yml'

- name: 'Install Engram plugin'
  ansible.builtin.include_tasks: engram.yml
  when:
    - opencode_engram_enable | bool
    - not opencode_skip_configure | bool

- name: 'Install OpenTmux plugin'
  ansible.builtin.include_tasks: opentmux.yml
  when:
    - opencode_opentmux_enable | bool
    - not opencode_skip_configure | bool

- name: 'Configure OpenCode'
  ansible.builtin.include_tasks: configure.yml
  when: not opencode_skip_configure | bool
