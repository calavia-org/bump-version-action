---
- name: 'Update apt cache...'
  when: ansible_pkg_mgr == 'apt'
  become: '{{ tmux_privilege_escalation }}'
  become_user: root
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: 'Install tmux os pkgs...'
  become: '{{ tmux_privilege_escalation }}'
  become_user: root
  ansible.builtin.package:
    name: '{{ tmux_os_pkgs }}'
    state: present
