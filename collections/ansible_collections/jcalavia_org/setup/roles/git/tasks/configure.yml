---
- name: 'Assert required git config vars'
  ansible.builtin.assert:
    that:
      - git_user_name | length > 0
      - git_user_email | length > 0
    fail_msg: >-
      git_user_name and git_user_email are required.
      Override them in your playbook, inventory, or vault.
      Example:
        roles:
          - role: jcalavia_org.setup.git
            git_user_name: 'Your Name'
            git_user_email: 'you@example.com'

- name: 'Deploy git configuration'
  ansible.builtin.template:
    src: gitconfig.j2
    dest: '{{ git_target_cfg }}'
    mode: '0644'
